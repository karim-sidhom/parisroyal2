<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Progress with Phoenix</title>
    <style>
        /* Réinitialisation de la page et centrage du contenu */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5; /* Un fond légèrement plus doux */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        /* Conteneur principal */
        .container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Ajout d'une ombre douce */
        }

        /* Style de l'image du phénix */
        .phoenix-img {
            max-width: 300px; /* Taille maximale de l'image */
            height: auto;
            display: block;
            margin: 0 auto 30px auto; /* Centre l'image et ajoute un espace en bas */
        }

        /* Style du texte */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            color: #444;
            text-transform: uppercase; /* Met le texte en majuscules */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://png.pngtree.com/png-vector/20260531/ourmid/pngtree-mystical-blue-phoenix-bird-with-spread-wings-fantasy-firebird-isolated-on-png-image_19379099.webp" alt="Un phénix mystique stylisé avec des ailes déployées" class="phoenix-img">
        
        <h1>In Progress...</h1>
    </div>

</body>
</html>
