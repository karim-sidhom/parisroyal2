<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚜️ PARIS ROYAL SERVICES ⚜️</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; padding: 0;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function ParisServices() {
            const [arr, setArr] = useState(null);
            const [act, setAct] = useState(null);
            const [price, setPrice] = useState(null);
            const [userLocation, setUserLocation] = useState(null);
            const [loading, setLoading] = useState(true);
            const [listening, setListening] = useState(false);
            const [voiceText, setVoiceText] = useState('');
            const [voiceSuggestions, setVoiceSuggestions] = useState(null);
            const [weather, setWeather] = useState(null);
            const [events, setEvents] = useState(null);
            const [masterCautionActive, setMasterCautionActive] = useState(false);
            const [masterCautionCountdown, setMasterCautionCountdown] = useState(null);
            const recognitionRef = useRef(null);
            const masterCautionIntervalRef = useRef(null);
            const masterCautionCountdownRef = useRef(null);

            const arrondissements = ['TOUS', '1er', '2e', '3e', '4e', '5e', '6e', '7e', '8e', '9e', '10e', '11e', '12e', '13e', '14e', '15e', '16e', '17e', '18e', '19e', '20e'];
            
            const activites = [
                { id: 'restaurants', label: '🍽️ Restaurants' },
                { id: 'fastfood', label: '🍔 Fast Food' },
                { id: 'cafes', label: '☕ Cafés' },
                { id: 'hotels', label: '🏨 Hôtels' },
                { id: 'pharmacies', label: '💊 Pharmacies' },
                { id: 'medecins', label: '👨‍⚕️ Médecins' },
                { id: 'bars', label: '🍸 Bars' },
                { id: 'cinemas', label: '🎬 Cinémas' },
                { id: 'musees', label: '🎨 Musées' },
                { id: 'coiffeurs', label: '💇 Coiffeurs' },
                { id: 'sallesport', label: '💪 Salles Sport' },
                { id: 'facultes', label: '🎓 Facultés' },
                { id: 'bibliotheques', label: '📚 Bibliothèques' },
            ];

            const prixOptions = [
                { id: 1, label: '💰 Bon Marché' },
                { id: 2, label: '💵 Prix Moyen' },
                { id: 3, label: '💎 Très Cher' },
            ];

            const urgenceOptions = [
                { id: 'samu', label: '🚑 SAMU', phone: '15' },
                { id: 'police', label: '🚔 Police', phone: '17' },
                { id: 'pompiers', label: '🚒 Pompiers', phone: '18' },
            ];

            const priceRanges = {
                1: '5€ - 15€',
                2: '15€ - 50€',
                3: '50€ +'
            };

            const arrCoords = {
                '1er': { lat: 48.8566, lng: 2.3522 },
                '2e': { lat: 48.8626, lng: 2.3625 },
                '3e': { lat: 48.8595, lng: 2.3625 },
                '4e': { lat: 48.8504, lng: 2.3568 },
                '5e': { lat: 48.8460, lng: 2.3495 },
                '6e': { lat: 48.8518, lng: 2.3380 },
                '7e': { lat: 48.8550, lng: 2.3175 },
                '8e': { lat: 48.8698, lng: 2.3088 },
                '9e': { lat: 48.8750, lng: 2.3320 },
                '10e': { lat: 48.8737, lng: 2.3675 },
                '11e': { lat: 48.8530, lng: 2.3820 },
                '12e': { lat: 48.8378, lng: 2.3821 },
                '13e': { lat: 48.8242, lng: 2.3550 },
                '14e': { lat: 48.8330, lng: 2.3280 },
                '15e': { lat: 48.8450, lng: 2.3000 },
                '16e': { lat: 48.8700, lng: 2.2850 },
                '17e': { lat: 48.8850, lng: 2.3000 },
                '18e': { lat: 48.8867, lng: 2.3450 },
                '19e': { lat: 48.8800, lng: 2.3900 },
                '20e': { lat: 48.8634, lng: 2.3950 },
            };

            useEffect(() => {
                fetch('https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522&current=temperature_2m,weather_code,wind_speed_10m&timezone=Europe/Paris')
                    .then(res => res.json())
                    .then(data => {
                        if (data.current) {
                            setWeather({
                                temp: Math.round(data.current.temperature_2m),
                                condition: data.current.weather_code,
                                wind: data.current.wind_speed_10m
                            });
                        }
                    })
                    .catch(err => console.log('Météo erreur:', err));

                const events = [
                    { date: 'Aujourd\'hui', title: 'Exposition Musée d\'Orsay', site: 'https://www.musee-orsay.fr' },
                    { date: 'Demain', title: 'Concert à la Salle Pleyel', site: 'https://www.sallepleyel.paris' },
                    { date: 'Jeudi', title: 'Festival du Cinéma Français', site: 'https://www.festival-cinema.fr' },
                    { date: 'Vendredi', title: 'Marché aux Fleurs Île de la Cité', site: 'https://www.paris.fr' },
                    { date: 'Samedi', title: 'Course à Pied Marathon de Paris', site: 'https://www.marathondeparis.com' },
                ];
                setEvents(events);

                setLoading(true);
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            const userLat = latitude;
                            const userLng = longitude;

                            if (userLat >= 48.7 && userLat <= 49.0 && userLng >= 2.1 && userLng <= 2.5) {
                                let closestArr = '1er';
                                let minDistance = Infinity;

                                Object.keys(arrCoords).forEach((a) => {
                                    const coord = arrCoords[a];
                                    const distance = Math.sqrt(
                                        Math.pow(coord.lat - userLat, 2) + Math.pow(coord.lng - userLng, 2)
                                    );
                                    if (distance < minDistance) {
                                        minDistance = distance;
                                        closestArr = a;
                                    }
                                });

                                setUserLocation(closestArr);
                                setArr(closestArr);
                            }

                            setLoading(false);
                        },
                        () => {
                            setLoading(false);
                        }
                    );
                } else {
                    setLoading(false);
                }
            }, []);

            const traiterCommande = (text) => {
                const lower = text.toLowerCase();
                let budget = null;
                let categories = [];

                const eurMatch = lower.match(/(\d+)\s*(euro|€)/);
                const dinMatch = lower.match(/(\d+)\s*(dinar|dn)/);
                
                if (eurMatch) {
                    const amount = parseInt(eurMatch[1]);
                    if (amount < 20) budget = 1;
                    else if (amount < 50) budget = 2;
                    else budget = 3;
                } else if (dinMatch) {
                    const amount = parseInt(dinMatch[1]);
                    if (amount < 50) budget = 1;
                    else if (amount < 150) budget = 2;
                    else budget = 3;
                }

                if (lower.includes('manger') || lower.includes('restaurant') || lower.includes('nourriture') || lower.includes('akla')) {
                    categories.push('restaurants', 'fastfood', 'cafes');
                }
                if (lower.includes('boire') || lower.includes('bar') || lower.includes('bière') || lower.includes('beer') || lower.includes('whisky')) {
                    categories.push('bars');
                }
                if (lower.includes('café') || lower.includes('thé') || lower.includes('coffee')) {
                    categories.push('cafes');
                }

                setVoiceSuggestions({
                    budget: budget,
                    categories: categories.length > 0 ? categories : ['restaurants', 'cafes', 'bars'],
                    text: text
                });
            };

            const startListening = () => {
                if (recognitionRef.current) {
                    setVoiceText('');
                    recognitionRef.current.start();
                }
            };

            const activateMasterCaution = () => {
                setMasterCautionActive(true);
                setMasterCautionCountdown(20);
                
                const playAlarmSound = () => {
                    try {
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
                        
                        gainNode.gain.setValueAtTime(1, audioContext.currentTime);
                        
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.3);
                    } catch (e) {
                        console.log('Audio erreur');
                    }
                };
                
                const speakEmergency = () => {
                    const message = `Au secours! Au secours! Master caution!`;
                    const utterance = new SpeechSynthesisUtterance(message);
                    utterance.lang = 'fr-FR';
                    utterance.rate = 1.5;
                    utterance.volume = 1;
                    speechSynthesis.speak(utterance);
                };
                
                const sendEmergencyMessage = () => {
                    navigator.geolocation.getCurrentPosition((position) => {
                        const lat = position.coords.latitude.toFixed(4);
                        const lng = position.coords.longitude.toFixed(4);
                        
                        window.location.href = 'tel:15';
                        
                        const message = `Je m'appelle Aziz Guerbouj. Je suis diabétique type 1. Si je vous appelle, c'est que je vais mal. C'est une urgence absolue. Venez me chercher au point GPS déterminé par le GPS. Latitude ${lat}, Longitude ${lng}. Urgence absolue. Dépêchez-vous.`;
                        const utterance = new SpeechSynthesisUtterance(message);
                        utterance.lang = 'fr-FR';
                        utterance.rate = 0.9;
                        speechSynthesis.speak(utterance);
                    });
                };
                
                if (masterCautionCountdownRef.current) {
                    clearInterval(masterCautionCountdownRef.current);
                }
                
                masterCautionCountdownRef.current = setInterval(() => {
                    setMasterCautionCountdown((prev) => {
                        if (prev === null || prev <= 1) {
                            clearInterval(masterCautionCountdownRef.current);
                            sendEmergencyMessage();
                            
                            if (masterCautionIntervalRef.current) {
                                clearInterval(masterCautionIntervalRef.current);
                            }
                            
                            const continuousAlarm = setInterval(() => {
                                playAlarmSound();
                                speakEmergency();
                            }, 2000);
                            
                            playAlarmSound();
                            speakEmergency();
                            
                            masterCautionIntervalRef.current = continuousAlarm;
                            return null;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const deactivateMasterCaution = () => {
                setMasterCautionActive(false);
                setMasterCautionCountdown(null);
                speechSynthesis.cancel();
                if (masterCautionCountdownRef.current) {
                    clearInterval(masterCautionCountdownRef.current);
                }
                if (masterCautionIntervalRef.current) {
                    clearInterval(masterCautionIntervalRef.current);
                }
            };

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;
                    recognitionRef.current.lang = 'fr-FR';

                    recognitionRef.current.onstart = () => setListening(true);
                    recognitionRef.current.onend = () => setListening(false);

                    recognitionRef.current.onresult = (event) => {
                        let transcript = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            transcript += event.results[i][0].transcript;
                        }
                        setVoiceText(transcript);
                        traiterCommande(transcript);
                    };
                }
            }, []);

            const generateServices = (category, arrondissement) => {
                const names = {
                    restaurants: ['Au Petit', 'La Maison', 'Le Coin', 'Chez Marie', 'Table Gourmande', 'Le Vrai Goût', 'Saveurs du Monde', 'Restaurant Belle Vue'],
                    fastfood: ['McDonald\'s', 'Burger King', 'Quick', 'KFC', 'Subway', 'Kebab Palace', 'Pizza Hut', 'Tacos Fiesta'],
                    cafes: ['Café du Matin', 'The Coffee House', 'Café Parisien', 'Le Salon de Thé', 'Bistro Café', 'Café Noir', 'Espresso Passion', 'Café Chic'],
                    hotels: ['Hôtel du Parc', 'Hotel Belle Époque', 'Le Séjour', 'Hotel Luxe', 'Hotel Étoile', 'Hotel Marais', 'The Grand Hotel', 'Hotel Parisien'],
                    pharmacies: ['Pharmacie Centrale', 'Pharmacie du Coin', 'Pharmacie Nuit', 'Pharmacie Moderne', 'Grande Pharmacie', 'Pharmacie Saint', 'Pharmacie Plus', 'Pharmacie Santé'],
                    medecins: ['Dr. Martin', 'Dr. Dubois', 'Dr. Laurent', 'Dr. Michel', 'Dr. Bernard', 'Clinique Santé', 'Cabinet Médical', 'Dr. Leclerc'],
                    bars: ['Bar du Soir', 'Le Cocktail', 'Bar Lounge', 'The Nightclub', 'Bar Chic', 'Café Bar', 'Le Pub', 'Bar Élégant'],
                    cinemas: ['Cinéma Étoile', 'Le Cinéma', 'Cinema Lumière', 'UGC Cinémas', 'Gaumont', 'Cinema Royal', 'Cinema Plus', 'The Movie House'],
                    musees: ['Musée de l\'Art', 'Galerie Moderne', 'Musée Historique', 'Le Musée', 'Galerie Beauté', 'Musée de la Ville', 'Espace Art', 'Galerie Contemporaine'],
                    coiffeurs: ['Coiffure Élégance', 'Salon de Beauté', 'Coiffure Moderne', 'Le Salon', 'Hair Style', 'Coiffure Prestige', 'Salon Chic', 'Coiffure Paris'],
                    sallesport: ['Fitness Club', 'Gym Passion', 'Sport Plus', 'Gym Élite', 'Fitness Center', 'Club Sport', 'Musculation Pro', 'Gym Moderne'],
                    facultes: ['Sorbonne Université', 'Université Paris Cité', 'PSL Université', 'École Polytechnique', 'ESSEC', 'HEC Paris', 'Université Panthéon-Assas', 'INSEAD'],
                    bibliotheques: ['Bibliothèque Nationale', 'BnF Richelme', 'Bibliothèque Sainte-Geneviève', 'Bibliothèque Forney', 'Bibliothèque Publique', 'Médiathèque Paris', 'Centre Culturel', 'Bibliothèque Municipale'],
                };

                const arrNum = parseInt(arrondissement);
                const results = [];
                const baseNum = (arrNum * 1000) + (Object.keys(names).indexOf(category) * 100);
                
                for (let i = 0; i < 8; i++) {
                    const nameList = names[category];
                    const name = nameList[i % nameList.length] + ' ' + arrondissement;
                    const phone = `01 ${String(40 + arrNum).padStart(2, '0')} ${String(baseNum + i).padStart(5, '0')}`.replace(/(\d{2})(\d{2})(\d{5})/, '$1 $2 $3');
                    const rating = (4.0 + Math.random() * 0.9).toFixed(1);
                    const lat = arrCoords[arrondissement].lat + (Math.random() - 0.5) * 0.01;
                    const lng = arrCoords[arrondissement].lng + (Math.random() - 0.5) * 0.01;
                    const priceLevel = (i % 3) + 1;
                    
                    results.push({
                        name,
                        phone,
                        address: `Rue ${i + 1}, ${arrondissement}`,
                        rating: parseFloat(rating),
                        lat,
                        lng,
                        priceLevel,
                        priceRange: priceRanges[priceLevel],
                        website: `https://www.${name.replace(/\s+/g, '').toLowerCase()}.fr`
                    });
                }
                
                return results;
            };

            const results = useMemo(() => {
                if (!act) return [];
                
                let allResults = [];
                
                if (arr === 'TOUS') {
                    const arrs = ['1er', '2e', '3e', '4e', '5e', '6e', '7e', '8e', '9e', '10e', '11e', '12e', '13e', '14e', '15e', '16e', '17e', '18e', '19e', '20e'];
                    arrs.forEach(a => {
                        allResults.push(...generateServices(act, a));
                    });
                } else if (arr) {
                    allResults = generateServices(act, arr);
                }

                if (price) {
                    allResults = allResults.filter(s => s.priceLevel === price);
                }

                return allResults;
            }, [arr, act, price]);

            if (loading) {
                return (
                    <div style={{ backgroundColor: '#f5f3ee', minHeight: '100vh', padding: '40px 20px', fontFamily: 'Georgia, serif', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <div style={{ textAlign: 'center' }}>
                            <div style={{ fontSize: '60px', marginBottom: '20px' }}>⚜️</div>
                            <h1 style={{ fontSize: '40px', color: '#193778' }}>PARIS ROYAL</h1>
                            <p style={{ fontSize: '18px', color: '#666', marginTop: '20px' }}>Chargement...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ backgroundColor: '#f5f3ee', minHeight: '100vh', padding: '40px 20px', fontFamily: 'Georgia, serif' }}>
                    
                    <style>{`
                        @keyframes glow {
                            0%, 100% { opacity: 1; text-shadow: 0 0 10px #d4af37, 0 0 20px #d4af37; }
                            50% { opacity: 0.5; text-shadow: 0 0 20px #d4af37, 0 0 30px #d4af37, 0 0 40px #d4af37; }
                        }
                        .paris-royal-title {
                            animation: glow 2s ease-in-out infinite;
                        }
                        @keyframes pulse {
                            0%, 100% { opacity: 1; }
                            50% { opacity: 0.5; }
                        }
                    `}</style>

                    {/* TITRE PARIS ROYAL */}
                    <div style={{ textAlign: 'center', marginBottom: '30px', borderBottom: '4px solid #d4af37', paddingBottom: '30px' }}>
                        <div style={{ fontSize: '60px', marginBottom: '20px' }}>⚜️</div>
                        <h1 className="paris-royal-title" style={{ fontSize: '50px', fontWeight: 'normal', letterSpacing: '4px', color: '#d4af37', margin: 0 }}>PARIS ROYAL</h1>
                        <p style={{ fontSize: '14px', fontStyle: 'italic', color: '#8b7d6b', margin: '15px 0 0 0' }}>HONORABLE SIEUR AZIZ GUERBOUJ</p>
                        <div style={{ fontSize: '50px', margin: '20px 0', letterSpacing: '10px', color: '#d4af37' }}>⚜️ ⚜️ ⚜️</div>
                        
                        {/* SECTION GPS */}
                        <div style={{ backgroundColor: '#d4af37', padding: '20px', borderRadius: '8px', border: '3px solid #193778', marginTop: '20px', maxWidth: '600px', margin: '20px auto 0' }}>
                            <h3 style={{ fontSize: '18px', fontWeight: 'bold', color: '#193778', margin: '0 0 15px 0' }}>📍 POSITION GPS</h3>
                            <p style={{ fontSize: '14px', color: '#193778', margin: '5px 0', fontWeight: 'bold' }}>Arrondissement: <span style={{ fontSize: '16px', color: '#193778' }}>{userLocation || 'En cours...'}</span></p>
                            <p style={{ fontSize: '12px', color: '#193778', margin: '8px 0' }}>Coordonnées: 48.8566°N, 2.3522°E</p>
                            <div style={{ display: 'flex', gap: '10px', marginTop: '15px', flexWrap: 'wrap', justifyContent: 'center' }}>
                                <a href={`https://maps.google.com/maps?q=${userLocation || '48.8566,2.3522'}&z=14`} target="_blank" rel="noopener noreferrer" style={{ padding: '12px 25px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: '3px solid #d4af37', display: 'inline-block' }}>
                                    🗺️ Lien GPS
                                </a>
                                <a href={`https://maps.google.com/maps?q=my+location&z=14`} target="_blank" rel="noopener noreferrer" style={{ padding: '12px 25px', backgroundColor: '#d4af37', color: '#193778', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: '3px solid #193778', display: 'inline-block' }}>
                                    📌 TU ES ICI
                                </a>
                                <button onClick={masterCautionCountdown !== null ? deactivateMasterCaution : activateMasterCaution} style={{ padding: '12px 25px', backgroundColor: masterCautionCountdown !== null ? '#ff0000' : '#cc0000', color: '#fff', textAlign: 'center', borderRadius: '6px', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer', border: '3px solid #fff', display: 'inline-block', textDecoration: 'none', boxShadow: masterCautionCountdown !== null ? '0 0 20px #ff0000' : 'none', animation: masterCautionCountdown !== null ? 'pulse 0.5s infinite' : 'none' }}>
                                    🚨 {masterCautionCountdown !== null ? `APPEL EN ${masterCautionCountdown}s` : (masterCautionActive ? 'DÉSACTIVER' : 'MASTER CAUTION')}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* MÉTÉO ET ÉVÉNEMENTS */}
                    <div style={{ maxWidth: '1200px', margin: '0 auto', marginBottom: '30px', padding: '20px', backgroundColor: '#193778', borderRadius: '8px', border: '3px solid #d4af37' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '30px' }}>
                            {/* MÉTÉO */}
                            <div style={{ color: '#fff' }}>
                                <h3 style={{ fontSize: '20px', fontWeight: 'bold', margin: '0 0 15px 0' }}>🌤️ MÉTÉO PARIS</h3>
                                {weather ? (
                                    <div>
                                        <p style={{ fontSize: '40px', fontWeight: 'bold', margin: '0' }}>{weather.temp}°C</p>
                                        <p style={{ fontSize: '16px', margin: '10px 0 0 0' }}>💨 Vent: {Math.round(weather.wind)} km/h</p>
                                    </div>
                                ) : (
                                    <p style={{ fontSize: '16px' }}>Chargement...</p>
                                )}
                            </div>

                            {/* ÉVÉNEMENTS */}
                            <div style={{ color: '#fff' }}>
                                <h3 style={{ fontSize: '20px', fontWeight: 'bold', margin: '0 0 15px 0' }}>📅 ÉVÉNEMENTS</h3>
                                {events && (
                                    <div style={{ fontSize: '13px', lineHeight: '1.8' }}>
                                        {events.slice(0, 3).map((event, i) => (
                                            <p key={i} style={{ margin: '5px 0' }}>
                                                <strong>{event.date}:</strong>{' '}
                                                <a href={event.site} target="_blank" rel="noopener noreferrer" style={{ color: '#d4af37', textDecoration: 'underline' }}>
                                                    {event.title}
                                                </a>
                                            </p>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div style={{ maxWidth: '1200px', margin: '0 auto' }}>

                        {/* SECTION MICRO */}
                        <div style={{ marginBottom: '30px', padding: '15px', backgroundColor: listening ? '#ff6b6b' : '#d4af37', borderRadius: '6px', border: '2px solid #193778', textAlign: 'center' }}>
                            <button
                                onClick={startListening}
                                disabled={listening}
                                style={{
                                    padding: '15px 30px',
                                    backgroundColor: listening ? '#ff4444' : '#193778',
                                    color: '#d4af37',
                                    border: 'none',
                                    borderRadius: '6px',
                                    fontWeight: 'bold',
                                    fontSize: '18px',
                                    cursor: listening ? 'not-allowed' : 'pointer',
                                    opacity: listening ? 0.7 : 1
                                }}
                            >
                                🎤 {listening ? 'ÉCOUTE...' : 'PARLEZ!'}
                            </button>
                            {voiceText && (
                                <p style={{ marginTop: '10px', color: '#193778', fontWeight: 'bold', fontSize: '14px' }}>
                                    "{voiceText}"
                                </p>
                            )}
                        </div>

                        {/* SUGGESTIONS VOCALES */}
                        {voiceSuggestions && (
                            <div style={{ marginBottom: '30px', padding: '20px', backgroundColor: '#fff9e6', borderRadius: '6px', border: '3px solid #d4af37' }}>
                                <h3 style={{ color: '#193778', margin: '0 0 15px 0' }}>💡 Suggestions intelligentes :</h3>
                                <p style={{ color: '#666', margin: '0 0 15px 0' }}>Budget: {voiceSuggestions.budget === 1 ? '💰 Bon marché' : voiceSuggestions.budget === 2 ? '💵 Moyen' : '💎 Cher'}</p>
                                <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                                    {voiceSuggestions.categories.map(cat => (
                                        <button
                                            key={cat}
                                            onClick={() => {
                                                setArr('TOUS');
                                                setAct(cat);
                                                if (voiceSuggestions.budget) setPrice(voiceSuggestions.budget);
                                            }}
                                            style={{
                                                padding: '10px 15px',
                                                backgroundColor: '#193778',
                                                color: '#d4af37',
                                                border: '2px solid #d4af37',
                                                borderRadius: '4px',
                                                fontWeight: 'bold',
                                                cursor: 'pointer',
                                                fontSize: '14px'
                                            }}
                                        >
                                            {activites.find(a => a.id === cat)?.label || cat}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* SECTION URGENCE */}
                        <div style={{ marginBottom: '30px', padding: '12px', backgroundColor: '#d4af37', borderRadius: '6px', border: '2px solid #193778' }}>
                            <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', flexWrap: 'wrap' }}>
                                {urgenceOptions.map((u) => (
                                    <a
                                        key={u.id}
                                        href={`tel:${u.phone}`}
                                        style={{
                                            padding: '10px 16px',
                                            backgroundColor: '#193778',
                                            color: '#d4af37',
                                            textAlign: 'center',
                                            textDecoration: 'none',
                                            borderRadius: '4px',
                                            fontWeight: 'bold',
                                            fontSize: '14px',
                                            cursor: 'pointer',
                                            transition: 'all 0.3s',
                                            border: '2px solid #d4af37'
                                        }}
                                    >
                                        {u.label} {u.phone}
                                    </a>
                                ))}
                            </div>
                        </div>

                        <div style={{ marginBottom: '50px' }}>
                            <h2 style={{ fontSize: '26px', color: '#193778', marginBottom: '20px', fontWeight: 'normal', letterSpacing: '2px' }}>📍 ARRONDISSEMENTS</h2>
                            <div style={{ display: 'flex', gap: '12px', overflowX: 'auto', paddingBottom: '15px', flexWrap: 'wrap' }}>
                                {arrondissements.map((a) => (
                                    <button
                                        key={a}
                                        onClick={() => setArr(a)}
                                        style={{
                                            padding: '16px 24px',
                                            backgroundColor: arr === a ? '#193778' : '#fff',
                                            color: arr === a ? '#d4af37' : '#193778',
                                            border: `3px solid ${arr === a ? '#193778' : '#d4af37'}`,
                                            borderRadius: '6px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontSize: '18px',
                                            transition: 'all 0.3s',
                                            minWidth: a === 'TOUS' ? '120px' : '90px',
                                            textAlign: 'center'
                                        }}
                                    >
                                        {a}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div style={{ marginBottom: '50px' }}>
                            <h2 style={{ fontSize: '26px', color: '#193778', marginBottom: '20px', fontWeight: 'normal', letterSpacing: '2px' }}>🏷️ ACTIVITÉS</h2>
                            <div style={{ display: 'flex', gap: '12px', overflowX: 'auto', paddingBottom: '15px', flexWrap: 'wrap' }}>
                                {activites.map((a) => (
                                    <button
                                        key={a.id}
                                        onClick={() => setAct(a.id)}
                                        style={{
                                            padding: '16px 24px',
                                            backgroundColor: act === a.id ? '#193778' : '#fff',
                                            color: act === a.id ? '#d4af37' : '#193778',
                                            border: `3px solid ${act === a.id ? '#193778' : '#d4af37'}`,
                                            borderRadius: '6px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontSize: '18px',
                                            transition: 'all 0.3s',
                                            whiteSpace: 'nowrap'
                                        }}
                                    >
                                        {a.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div style={{ marginBottom: '50px' }}>
                            <h2 style={{ fontSize: '26px', color: '#193778', marginBottom: '20px', fontWeight: 'normal', letterSpacing: '2px' }}>💰 PRIX</h2>
                            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                                {prixOptions.map((p) => (
                                    <button
                                        key={p.id}
                                        onClick={() => setPrice(price === p.id ? null : p.id)}
                                        style={{
                                            padding: '16px 24px',
                                            backgroundColor: price === p.id ? '#193778' : '#fff',
                                            color: price === p.id ? '#d4af37' : '#193778',
                                            border: `3px solid ${price === p.id ? '#193778' : '#d4af37'}`,
                                            borderRadius: '6px',
                                            fontWeight: 'bold',
                                            cursor: 'pointer',
                                            fontSize: '18px',
                                            transition: 'all 0.3s',
                                            whiteSpace: 'nowrap'
                                        }}
                                    >
                                        {p.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* TRANSPORTS */}
                        <div style={{ marginBottom: '50px', padding: '30px', backgroundColor: '#193778', borderRadius: '8px', border: '3px solid #d4af37' }}>
                            <h2 style={{ fontSize: '26px', color: '#d4af37', marginBottom: '30px', fontWeight: 'normal', letterSpacing: '2px', textAlign: 'center' }}>✈️ TRANSPORTS PARIS</h2>
                            <div style={{ marginBottom: '30px', textAlign: 'center' }}>
                                <a href="https://maps.google.com/?q=paris+transports&z=12&t=s" target="_blank" rel="noopener noreferrer" style={{ padding: '18px 40px', backgroundColor: '#d4af37', color: '#193778', textAlign: 'center', textDecoration: 'none', borderRadius: '8px', fontWeight: 'bold', fontSize: '18px', cursor: 'pointer', border: '3px solid #fff', display: 'inline-block', transition: 'all 0.3s' }}>
                                    🗺️ GOOGLE MAPS - VUE SATELLITE
                                </a>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '20px' }}>
                                
                                {/* AÉROPORTS */}
                                <div style={{ backgroundColor: '#fff', padding: '25px', borderRadius: '6px', border: '3px solid #d4af37' }}>
                                    <h3 style={{ fontSize: '24px', color: '#193778', margin: '0 0 15px 0', textAlign: 'center' }}>✈️ AÉROPORTS</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                        <a href="https://www.parisaeroport.fr" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🌍 Orly
                                        </a>
                                        <a href="https://www.parisaeroport.fr" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            ✈️ Charles de Gaulle
                                        </a>
                                        <a href="https://www.parisaeroport.fr" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🚁 Le Bourget
                                        </a>
                                    </div>
                                </div>

                                {/* MÉTRO */}
                                <div style={{ backgroundColor: '#fff', padding: '25px', borderRadius: '6px', border: '3px solid #d4af37' }}>
                                    <h3 style={{ fontSize: '24px', color: '#193778', margin: '0 0 15px 0', textAlign: 'center' }}>🚇 MÉTRO PARIS</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                        <a href="https://www.ratp.fr/metro" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🗺️ Plan du Métro
                                        </a>
                                        <a href="https://www.ratp.fr" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🎟️ Tarifs RATP
                                        </a>
                                        <a href="tel:3424" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            📞 Infos (3424)
                                        </a>
                                    </div>
                                </div>

                                {/* RER */}
                                <div style={{ backgroundColor: '#fff', padding: '25px', borderRadius: '6px', border: '3px solid #d4af37' }}>
                                    <h3 style={{ fontSize: '24px', color: '#193778', margin: '0 0 15px 0', textAlign: 'center' }}>🚄 RER PARIS</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                        <a href="https://www.ratp.fr/rer" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🗺️ Plan RER
                                        </a>
                                        <a href="https://www.sncf-connect.com" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🎫 Réserver
                                        </a>
                                        <a href="tel:3424" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            ℹ️ Infos (3424)
                                        </a>
                                    </div>
                                </div>

                                {/* BUS */}
                                <div style={{ backgroundColor: '#fff', padding: '25px', borderRadius: '6px', border: '3px solid #d4af37' }}>
                                    <h3 style={{ fontSize: '24px', color: '#193778', margin: '0 0 15px 0', textAlign: 'center' }}>🚌 BUS PARIS</h3>
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                        <a href="https://www.ratp.fr/bus" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            🗺️ Plan des Bus
                                        </a>
                                        <a href="https://www.ratp.fr/horaires" target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            ⏰ Horaires
                                        </a>
                                        <a href="tel:3424" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', cursor: 'pointer' }}>
                                            📞 Service (3424)
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {arr && act && (
                            <div>
                                <h2 style={{ fontSize: '28px', color: '#193778', marginBottom: '30px', borderBottom: '3px solid #d4af37', paddingBottom: '15px', fontWeight: 'normal', letterSpacing: '2px' }}>
                                    📋 {arr} • {activites.find(a => a.id === act)?.label} {price && `• ${prixOptions.find(p => p.id === price)?.label}`} ({results.length} résultats)
                                </h2>

                                {results.length > 0 ? (
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(360px, 1fr))', gap: '30px' }}>
                                        {results.map((s, i) => (
                                            <div key={i} style={{ backgroundColor: '#fff', padding: '30px', border: '3px solid #d4af37', borderRadius: '6px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)' }}>
                                                <h3 style={{ fontSize: '22px', fontWeight: 'bold', color: '#193778', margin: '0 0 15px 0' }}>{s.name}</h3>
                                                <p style={{ color: '#666', margin: '0 0 12px 0', fontSize: '16px' }}>📍 {s.address}</p>
                                                <p style={{ color: '#d4af37', fontWeight: 'bold', fontSize: '18px', margin: '0 0 10px 0' }}>⭐ {s.rating}</p>
                                                <p style={{ color: '#193778', fontWeight: 'bold', fontSize: '16px', margin: '0 0 20px 0', backgroundColor: '#f0f0f0', padding: '8px 12px', borderRadius: '4px' }}>
                                                    💰 {s.priceRange}
                                                </p>
                                                
                                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginTop: '15px' }}>
                                                    <a href={`tel:${s.phone}`} style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', fontSize: '14px', cursor: 'pointer' }}>
                                                        📞 Appel
                                                    </a>
                                                    <a href={s.website} target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', fontSize: '14px', cursor: 'pointer' }}>
                                                        🌐 Site
                                                    </a>
                                                    <a href={`https://www.google.com/maps?q=${s.lat},${s.lng}`} target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#d4af37', color: '#193778', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', fontSize: '14px', cursor: 'pointer' }}>
                                                        🗺️ Maps
                                                    </a>
                                                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&destination_place_id=${s.name}`} target="_blank" rel="noopener noreferrer" style={{ padding: '12px', backgroundColor: '#193778', color: '#d4af37', textAlign: 'center', textDecoration: 'none', borderRadius: '6px', fontWeight: 'bold', fontSize: '14px', cursor: 'pointer', gridColumn: '1 / -1' }}>
                                                        🛣️ Itinéraire
                                                    </a>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div style={{ backgroundColor: '#fff', padding: '50px', borderRadius: '6px', border: '3px solid #d4af37', textAlign: 'center' }}>
                                        <p style={{ fontSize: '20px', color: '#666' }}>❌ Aucun résultat</p>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>

                    <div style={{ textAlign: 'center', borderTop: '4px solid #d4af37', paddingTop: '30px', marginTop: '80px' }}>
                        <div style={{ fontSize: '40px' }}>⚜️</div>
                        <p style={{ fontSize: '14px', color: '#8b7d6b', fontStyle: 'italic', margin: '15px 0 0 0' }}>MADE UNDER AUTHORITY OF HIS HONOR LORD SIDHOM I 2026</p>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ParisServices />);
    </script>
</body>
</html>
